<svg xmlns="http://www.w3.org/2000/svg"
     width="900"
     height="900"
     viewBox="0 0 900 900"
     fill="none">

    <defs>

        <radialGradient id="blobGradient"
                         cx="50%"
                         cy="50%"
                         r="50%">

          <stop offset="0%"

      stop-color="#7C4AA5"

      stop-opacity="0.55"/>

<stop offset="60%"

      stop-color="#8B5BB2"

      stop-opacity="0.35"/>

            <stop offset="100%"
